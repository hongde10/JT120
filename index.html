<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Silence of Light</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@100;300;400;500&family=Playfair+Display:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="nav-shell" id="nav">
      <nav class="nav">
        <a class="brand" href="#hero">D.d.</a>
        <div class="nav-links">
          <a href="#portfolio">作品集</a>
          <a href="#about">关于</a>
          <a href="#journal">日志</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="hero" id="hero" aria-label="全屏轮播">
        <div class="slides" id="slides"></div>
        <div class="hero-overlay"></div>
        <div class="hero-info reveal">
          <h1 id="slideTitle">tree</h1>
          <p id="slideSubtitle">记录光影间隙</p>
        </div>
        <button class="arrow arrow-left" id="prevBtn" aria-label="上一张">‹</button>
        <button class="arrow arrow-right" id="nextBtn" aria-label="下一张">›</button>
        <div class="hero-bottom">
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="counter" id="counter">01 / 05</div>
        </div>
      </section>

      <section class="about section" id="about">
        <div class="about-photo reveal">
          <img
            src="./微信图片_20260414153905_230_15.jpg"
            alt="人物工作照"
          />
        </div>
        <div class="about-content reveal">
          <span class="about-tag">关于他</span>
          <p>
            这是北大青鸟最帅的男人邱澄
          </p>
          <a href="#portfolio" class="line-link">快来一起探索更多关于他的秘密  -></a>
        </div>
      </section>

      <section class="portfolio section" id="portfolio">
        <article class="card large reveal">
          <img
            src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1400&q=80"
            alt="海岸风景"
          />
          <div class="card-tag">Landscape · Coastal Light</div>
        </article>
        <article class="card small reveal">
          <img
            src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80"
            alt="山谷云海"
          />
          <div class="card-tag">Travel · Cloud Valley</div>
        </article>
        <article class="card mid reveal">
          <img
            src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&w=1200&q=80"
            alt="森林薄雾"
          />
          <div class="card-tag">Nature · Quiet Forest</div>
        </article>
        <article class="card mid reveal">
          <img
            src="https://images.unsplash.com/photo-1454391304352-2bf4678b1a7a?auto=format&fit=crop&w=1200&q=80"
            alt="黄昏公路"
          />
          <div class="card-tag">Story · Dusk Road</div>
        </article>
      </section>
    </main>

    <footer class="footer section" id="journal">
      <p class="slogan">The world softens where light lingers.</p>
      <div class="socials">
        <a href="#" aria-label="Instagram">○</a>
        <a href="#" aria-label="Behance">△</a>
        <a href="#" aria-label="Dribbble">◇</a>
      </div>
      <small>© 2026 L.M. All rights reserved.</small>
    </footer>

    <button class="ai-fab" id="aiFab" aria-label="打开 AI 助手">
      <span class="chat-icon"></span>
    </button>

    <aside class="ai-panel" id="aiPanel" aria-hidden="true">
      <header class="ai-header">
        <button id="aiCollapse" class="ghost-btn" aria-label="收起">←</button>
        <span>AI Assistant</span>
        <button id="aiClear" class="ghost-btn" aria-label="清空对话">⌫</button>
      </header>
      <div class="mobile-grab" id="mobileGrab"></div>
      <div class="ai-messages" id="aiMessages"></div>
      <form class="ai-input-wrap" id="aiForm">
        <input id="aiInput" type="text" placeholder="问我任何关于这个网站的问题…" />
        <button type="submit" id="sendBtn" disabled>↑</button>
      </form>
      <p class="disclaimer">AI 优先本地规则，其余问题将调用智谱 API（Key 仅保存在当前浏览器）。</p>
    </aside>

    <script src="./app.js"></script>
  </body>
</html>
